<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betina Limpeza | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="produtos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #003399; /* Azul Prime */
            --primary-dark: #001f5c; 
            --accent: #00A8E1; /* Azul Turq */
            --highlight: #FFDE00; /* Amarelo */
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.1);
            
            --radius: 16px;
        }

        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            padding-top: 190px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
            box-shadow: var(--shadow-md);
            border-bottom: 4px solid var(--highlight);
        }

        .header-main {
            max-width: 1440px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; gap: 20px;
        }

        /* Logo Area */
        .brand-link { text-decoration: none; display: flex; align-items: center; flex-shrink: 0; }
        .brand-logo {
            max-width: 250px;
            width: 250px;
            height: auto;
            display: block;
        }
        .logo-reconstructed {
            width: 150px; 
            aspect-ratio: 1187 / 656;
            background: linear-gradient(180deg, #024a9c 0%, #003675 100%);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .logo-bubbles { position: absolute; inset: 0; pointer-events: none; }
        .l-bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(77, 182, 238, 0.9), rgba(25, 140, 210, 0.6)); }
        .lb1 { width: 25%; height: 45%; top: 18%; left: 22%; }
        .lb2 { width: 12%; height: 21%; top: 28%; left: 8%; }
        .logo-inner { position: relative; z-index: 10; text-align: center; width: 100%; }
        .l-brand { font-family: 'Arial Black', sans-serif; font-size: 24px; font-weight: 900; color: white; font-style: italic; letter-spacing: -1px; line-height: 0.9; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .l-tagline { font-size: 5px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: 1.2px; }

        /* Banner Atendimento Refined */
        .info-banner {
            display: flex; gap: 20px; background: rgba(255,255,255,0.08); 
           /* padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);*/
            padding: 15px 60px; border-radius: 80px; border: 2px solid var(--highlight);
            backdrop-filter: blur(10px); flex-grow: 1; max-width: 800px; justify-content: space-around;
        }
        .info-item { display: flex; align-items: center; gap: 12px; color: white; }
        .info-icon { 
            width: 38px; height: 38px; background: var(--highlight); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: var(--primary-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); flex-shrink: 0;
        }
        .info-icon svg { width: 20px; height: 20px; fill: currentColor; }
        .info-text { display: flex; flex-direction: column; line-height: 1.2; }
        .info-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.9; font-weight: 700; letter-spacing: 0.5px; }
        .info-value { font-size: 0.9rem; font-weight: 700; color: var(--highlight); }

        /* Contacts Top */
        .contacts-top { display: flex; flex-direction: column; gap: 5px; min-width: 200px; }
        .contact-pill {
            display: flex; align-items: center; gap: 8px; color: white; text-decoration: none;
            font-size: 0.96rem; font-weight: 600; padding: 5px 10px; border-radius: 8px;
            transition: 0.2s;
        }
        .contact-pill:hover { background: rgba(255,255,255,0.1); color: var(--highlight); }
        
        /* Search Area */
        .search-area { background: white; padding: 5px 0; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        .search-wrapper { 
            max-width: 1440px; margin: 0 auto; padding: 0 20px; 
            display: flex; align-items: center; gap: 20px; 
        }
        .input-group { 
            flex-grow: 1; position: relative; display: flex; align-items: center; 
            background: #f1f5f9; border-radius: 50px; border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .input-group:focus-within { background: white; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 168, 225, 0.1); }
        .search-icon { padding-left: 20px; color: var(--text-muted); display: flex; align-items: center; }
        #searchInput { 
            width: 100%; padding: 14px 15px; background: transparent; border: none; 
            font-size: 1rem; color: var(--text-main); font-weight: 500;
        }
        .stats-badge { 
            background: var(--primary); color: white; padding: 8px 20px; 
            border-radius: 30px; font-size: 0.85rem; font-weight: 600; white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none;
        }

        /* MAIN LAYOUT */
        .main-container {
            max-width: 1500px; margin: 15px auto; padding: 0 5px;
            display: grid; grid-template-columns: 1fr 390px; gap: 1px;
            align-items: start;
        }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(215px, 1fr)); gap: 5px; }
        
        /* PRODUCT CARD */
        .card { 
            background: var(--bg-card); border-radius: var(--radius); 
            box-shadow: var(--shadow-sm); border: 1px solid #cdd0d4;
            display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: var(--shadow-lg); 
            border-color: rgba(2, 66, 85, 0.89);
        }
        .card-img { 
            width: 100%; height: 162px; object-fit: contain; 
            padding: 15px; background: white;
            transition: transform 0.4s ease;
        }
        .card:hover .card-img { transform: scale(1.08); }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 2; background: white; }
        .card-name { 
            font-size: 0.7rem; font-weight: 780; color: var(--text-main); 
            margin-bottom: 1px; line-height: 1.4; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            min-height: 35px;
        }
        .card-ref { 
            font-size: 0.7rem; color: var(--text-muted); font-weight: 600; 
            margin-bottom: 12px; letter-spacing: 0.5px;
        }

        /* CONTROLS */
        .controls { display: flex; align-items: center; gap: 9px; margin-top: auto; }
        .qty-box { 
            display: flex; align-items: center; border: 1px solid #e2e8f0; 
            border-radius: 8px; height: 30px; overflow: hidden; background: #f8fafc;
        }
        .qty-btn { 
            width: 30px; height: 100%; border: none; background: transparent; 
            color: var(--primary); font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1.1rem;
        }
        .qty-btn:hover { background: #e2e8f0; }
        .qty-val { 
            width: 15px; border: none; text-align: center; font-weight: 700; 
            color: var(--text-main); font-size: 0.95rem; background: transparent;
        }
        .btn-add { 
            flex-grow: 1; height: 30px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, #0044cc 100%);
            color: white; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0, 51, 153, 0.15);
            transition: all 0.2s ease; letter-spacing: 0px;
        }
        .btn-add:hover { 
            transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0, 51, 153, 0.25); 
            background: linear-gradient(135deg, #0044cc 0%, var(--primary) 100%);
        }
        .btn-add:active { transform: translateY(0); box-shadow: none; }

        /* CART ASIDE */
        .cart { 
            background: white; border-radius: 16px; padding: 25px; 
            box-shadow: var(--shadow-lg); position: sticky; top: 210px;
            max-height: calc(100vh - 230px); display: flex; flex-direction: column;
            border: 1px solid #f1f5f9;
            transform: translateX(20%);
        }
        .cart-h { 
            font-size: 1.1rem; font-weight: 800; color: var(--primary); 
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9;
            display: flex; align-items: center; gap: 10px; letter-spacing: -0.5px;
        }
        .cart-list { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .cart-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.85rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .cart-item-info { flex-grow: 1; padding-right: 10px; }
        .cart-item-code { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 2px; }
        .cart-item-name { font-weight: 600; color: var(--text-main); line-height: 1.3; }
        
        .cart-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .cart-qty { 
            background: #f1f5f9; color: var(--primary); padding: 4px 10px; 
            border-radius: 6px; font-weight: 800; font-size: 0.85rem; 
        }
        .btn-del { 
            color: #cbd5e1; cursor: pointer; border: none; background: none; 
            transition: 0.2s; padding: 5px; display: flex;
        }
        .btn-del:hover { color: var(--danger); transform: scale(1.1); }
        
        .btn-finish { 
            margin-top: 25px; width: 100%; padding: 6px; border: none; border-radius: 10px;
            background: #25D366; color: white; font-weight: 800; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-finish:hover { 
            background: #1da851; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4); 
        }
        
        .btn-export { 
            margin-top: 10px; width: 100%; padding: 6px; border: none; border-radius: 10px;
            background: #007bff; color: white; font-weight: 800; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.25);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-export:hover { 
            background: #0056b3; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.4); 
        }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            body { padding-top: 250px; padding-bottom: 80px; } /* Added padding-bottom to prevent content hidden behind cart */
            .header-main { flex-direction: column; padding-bottom: 15px; }
            .info-banner { width: 100%; order: 3; max-width: 100%; overflow-x: auto; justify-content: flex-start; padding: 10px; }
            .info-item { min-width: max-content; margin-right: 20px; }
            .contacts-top { flex-direction: row; justify-content: center; width: 100%; gap: 20px; }
            .main-container { grid-template-columns: 1fr; margin-top: 20px; }
            
            .cart { 
                position: fixed; 
                bottom: 0; 
                left: 0;
                top: auto; /* Reset do top: 210px da versão desktop */
                width: 100%; 
                z-index: 2000;
                background: white;
                padding: 0; /* Remove padding do container para controle total nos filhos */
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -4px 25px rgba(0,0,0,0.15);
                border-top: 1px solid #e2e8f0;
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                display: flex; 
                flex-direction: column;
                max-height: 40vh; /* Respeitando o limite de 40% do viewport solicitado */
                transform: translateY(calc(100% - 60px)); /* Estado colapsado: mostra apenas o cabeçalho */
            }

            .cart.expanded {
                transform: translateY(0);
            }

            .cart-h {
                height: 60px;
                padding: 0 20px;
                margin-bottom: 0;
                border-bottom: 1px solid #f1f5f9;
                display: flex;
                align-items: center;
                justify-content: space-between;
                cursor: pointer;
                background: white;
                border-radius: 16px 16px 0 0;
                flex-shrink: 0;
            }

            .cart-h:active {
                background-color: #f8fafc;
            }

            .toggle-icon {
                transition: transform 0.3s ease;
                color: var(--primary);
            }

            .cart.expanded .toggle-icon {
                transform: rotate(180deg);
            }

            .cart-list {
                padding: 10px 20px;
                overflow-y: auto;
                flex-grow: 1;
                overscroll-behavior: contain; /* Evita scroll no body ao chegar no fim da lista */
            }

            .cart-footer {
                padding: 10px 20px 20px 20px;
                background: white;
                border-top: 1px solid #f1f5f9;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            
            .cart-footer .btn-finish,
            .cart-footer .btn-export {
                margin-top: 0;
            }
        }
        
        @media (max-width: 600px) {
            body { padding-top: 180px; padding-bottom: 100px; }
            .brand-logo { max-width: 80%; width: 80%; }
            .contacts-top { display: none; } /* Hide contacts on mobile header to save space */
            .info-banner { display: none; } /* Hide info banner on mobile */
            
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .main-container { padding: 0 10px; }
            
            .card-img { height: 140px; padding: 10px; }
            .card-body { padding: 12px; }
            .card-name { font-size: 0.75rem; min-height: 34px; }
            .card-ref { margin-bottom: 10px; }
            
            .btn-add { font-size: 0.65rem; padding: 0 5px; height: 32px; }
            .qty-box { height: 32px; }
            .qty-btn { width: 25px; }
            .qty-val { width: 25px; font-size: 0.8rem; }
            
            .btn-finish { padding: 11px; font-size: 0.85rem; }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://betinalimpeza.com.br/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://betinalimpeza.com.br/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>

</header>

<div class="main-container">
    <div class="grid" id="productGrid"></div>
    
    <aside class="cart" id="cartContainer" aria-label="Carrinho de compras">
        <div class="cart-h" onclick="toggleCart()" role="button" aria-expanded="false" tabindex="0" aria-controls="cartItems">
            <div style="display:flex; align-items:center; gap:10px;">

                Seu carrinho está vazio
            </div>

        <div class="cart-footer">
            <button class="btn-finish" onclick="sendWhatsApp()">
                <svg width="15" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                ENVIAR VIA WHATSAPP
            </button>
            <button class="btn-export" onclick="downloadOrderAsXLSX()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                Baixar Pedido (.xlsx)
            </button>
        </div>
    </aside>
</div>

<script>
    let cart = [];
    
    // Configurações de UI
    const CONFIG = {
        debounceTime: 300
    };

    function normalizeText(text) {
        return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function render(filter = '') {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        
        const terms = normalizeText(filter).split(/\s+/).filter(t => t.length > 0);
        
        const filtered = allProducts.filter(p => {
            if (terms.length === 0) return true;
            const text = normalizeText(p.nome + " " + p.codigo);
            return terms.every(term => text.includes(term));
        });
        
        // Atualiza contador
        const counterEl = document.getElementById('productCounter');
        const showEl = document.getElementById('showingCount');
        
        if (allProducts.length > 0) {
            counterEl.style.display = 'block';
            showEl.textContent = filtered.length;
        }

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted);">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🔍</div>
                    <h3 style="margin-bottom: 5px; color: var(--text-main);">Nenhum produto encontrado</h3>
                    <p>Tente usar termos diferentes ou verifique a ortografia.</p>
                </div>`;
            return;
        }

        filtered.forEach((p) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${p.imagem}" class="card-img" onerror="this.src='https://via.placeholder.com/200?text=Sem+Foto'" loading="lazy" alt="${p.nome}">
                <div class="card-body">
                    <div class="card-name" title="${p.nome}">${p.nome}</div>
                    <div class="card-ref">REF: ${p.codigo}</div>
                    <div class="controls">
                        <div class="qty-box">
                            <button class="qty-btn" onclick="updateQtyUI('${p.internalId}', -1)" aria-label="Diminuir quantidade de ${p.nome}">-</button>
                            <input type="text" id="qty-${p.internalId}" class="qty-val" value="1" readonly aria-label="Quantidade">
                            <button class="qty-btn" onclick="updateQtyUI('${p.internalId}', 1)" aria-label="Aumentar quantidade de ${p.nome}">+</button>
                        </div>
                        <button class="btn-add" onclick="addToCart('${p.internalId}')" aria-label="Adicionar ${p.nome} ao carrinho">Adicionar</button>
                    </div>
                </div>`;
            grid.appendChild(div);
        });
    }

    function updateQtyUI(id, delta) {
        const el = document.getElementById(`qty-${id}`);
        if(el) { let v = parseInt(el.value) + delta; if (v > 0) el.value = v; }
    }

    function addToCart(id) {
        const p = allProducts.find(i => i.internalId === id);
        if (!p) return;
        const qEl = document.getElementById(`qty-${id}`);
        const qty = parseInt(qEl.value);
        
        // Feedback visual
        const btn = document.querySelector(`button[onclick="addToCart('${id}')"]`);
        const originalText = btn.innerText;
        btn.innerText = "✓ Adicionado";
        btn.style.background = "var(--success)";
        setTimeout(() => { 
            btn.innerText = originalText; 
            btn.style.background = ""; // Volta ao gradiente original
        }, 1000);

        const exists = cart.find(i => i.internalId === id);
        if (exists) exists.q += qty; else cart.push({...p, q: qty});
        qEl.value = 1;
        updateCart();
    }

    function toggleCart() {
        const cart = document.getElementById('cartContainer');
        const header = document.querySelector('.cart-h');
        
        // Apenas alterna em telas menores onde o comportamento responsivo se aplica
        if (window.innerWidth <= 1100) {
            const isExpanded = cart.classList.contains('expanded');
            
            if (isExpanded) {
                cart.classList.remove('expanded');
                header.setAttribute('aria-expanded', 'false');
            } else {
                cart.classList.add('expanded');
                header.setAttribute('aria-expanded', 'true');
            }
        }
    }

    function updateCart() {
        const list = document.getElementById('cartItems');
        
        // Atualiza contador no cabeçalho (versão mobile/colapsável)
        const totalItems = cart.reduce((acc, item) => acc + item.q, 0);
        const countEl = document.getElementById('cartSummaryCount');
        if(countEl) {
            countEl.textContent = totalItems > 0 ? `${totalItems} itens` : '';
            countEl.style.display = totalItems > 0 ? 'inline-block' : 'none';
        }

        if (!cart.length) {
            list.innerHTML = `
            <div style="text-align:center; color:#94a3b8; font-size:0.85rem; padding:30px; display:flex; flex-direction:column; align-items:center; gap:10px;">
                <span style="font-size:2rem; opacity:0.5;">🛒</span>
                Seu carrinho está vazio
            </div>`;
            return;
        }
        
        list.innerHTML = '';
        cart.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-info">
                    <div class="cart-item-code">${item.codigo}</div>
                    <div class="cart-item-name">${item.nome}</div>
                </div>
                <div class="cart-actions">
                    <span class="cart-qty">x${item.q}</span>
                    <button class="btn-del" onclick="cart.splice(${i},1);updateCart()" aria-label="Remover item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>`;
            list.appendChild(div);
        });
    }

    function sendWhatsApp() {
        if (!cart.length) return alert("Adicione itens ao carrinho antes de enviar!");
        
        const phone = "5524988541101";
        let msg = "*Olá Betina Limpeza, gostaria de fazer um orçamento:*\n\n";
        
        cart.forEach(i => {
            msg += `📦 *${i.codigo}* - ${i.nome}\n   Qtd: ${i.q}\n\n`;
        });
        
        msg += "_Enviado pelo Catálogo Digital_";
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function downloadOrderAsXLSX() {
        if (!cart.length) return alert("Adicione itens ao carrinho antes de baixar a planilha!");

        const data = cart.map(item => ({
            "Código": item.codigo,
            "Produto": item.nome,
            "Quantidade": item.q
        }));

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);

        // Ajustar largura das colunas
        const wscols = [
            {wch: 15}, // Código
            {wch: 40}, // Produto
            {wch: 10}  // Quantidade
        ];
        ws['!cols'] = wscols;

        XLSX.utils.book_append_sheet(wb, ws, "Pedido");

        const now = new Date();
        const dateStr = now.toLocaleDateString('pt-BR').replace(/\//g, '-');
        const timeStr = now.toLocaleTimeString('pt-BR').replace(/:/g, '-');
        
        XLSX.writeFile(wb, `Pedido_Betina_${dateStr}_${timeStr}.xlsx`);
    }

    document.getElementById('searchInput').addEventListener('input', debounce(e => {
        const term = e.target.value;
        
        // Atualiza URL sem recarregar (SEO/UX)
        const url = new URL(window.location);
        if (term) {
            url.searchParams.set('q', term);
        } else {
            url.searchParams.delete('q');
        }
        window.history.replaceState({}, '', url);
        
        render(term);
    }, 300));
    
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            const context = this;
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(context, args), wait);
        };
    }
    
    window.onload = function() {
        console.log("Sistema iniciado.");
        if (typeof allProducts !== 'undefined' && Array.isArray(allProducts)) {
            // Gera IDs únicos
            allProducts.forEach((p, index) => {
                p.internalId = `prod_${index}_${p.codigo.replace(/[^a-zA-Z0-9]/g, '')}`;
            });

            // Recupera busca da URL (Deep Linking)
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById('searchInput').value = q;
                render(q);
            } else {
                render();
            }
        } else {
            console.error("Banco de dados não encontrado.");
            document.getElementById('productGrid').innerHTML = '<div style="padding:40px; text-align:center; color:var(--danger); font-weight:700;">Erro: Não foi possível carregar os produtos.</div>';
        }
    };
</script>
</body>
</html>
